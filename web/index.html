<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangLang-Go 控制台</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">🔴 LangLang</div>
        <div class="logo-sub">管理控制台</div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-page="dashboard" href="#/dashboard">
          <span class="nav-icon">📊</span>
          <span class="nav-label">仪表盘</span>
        </a>
        <a class="nav-item" data-page="plugins" href="#/plugins">
          <span class="nav-icon">📦</span>
          <span class="nav-label">插件管理</span>
        </a>
        <a class="nav-item" data-page="editor" href="#/editor">
          <span class="nav-icon">✏️</span>
          <span class="nav-label">脚本编辑</span>
        </a>
        <a class="nav-item" data-page="logs" href="#/logs">
          <span class="nav-icon">📋</span>
          <span class="nav-label">运行日志</span>
        </a>
        <a class="nav-item" data-page="settings" href="#/settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">系统设置</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">运行中</span>
      </div>
    </aside>

    <!-- 主区域 -->
    <main class="main">
      <!-- 顶栏 -->
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
        <h2 class="page-title" id="pageTitle">仪表盘</h2>
        <div class="topbar-right">
          <span class="version">v0.1.0</span>
        </div>
      </header>

      <!-- 页面内容 -->
      <div class="content" id="content">
        <!-- 各页面由 JS 动态渲染 -->
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
