<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangLang-Go 控制台</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">🔴 LangLang</div>
        <div class="logo-sub">管理控制台</div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-page="dashboard" href="#/dashboard">
          <span class="nav-icon">📊</span>
          <span class="nav-label">仪表盘</span>
        </a>
        <a class="nav-item" data-page="plugins" href="#/plugins">
          <span class="nav-icon">📦</span>
          <span class="nav-label">插件管理</span>
        </a>
        <a class="nav-item" data-page="editor" href="#/editor">
          <span class="nav-icon">✏️</span>
          <span class="nav-label">脚本编辑</span>
        </a>
        <a class="nav-item" data-page="logs" href="#/logs">
          <span class="nav-icon">📋</span>
          <span class="nav-label">运行日志</span>
        </a>
        <a class="nav-item" data-page="settings" href="#/settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">系统设置</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">运行中</span>
      </div>
    </aside>

    <!-- 主区域 -->
    <main class="main">
      <!-- 顶栏 -->
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
        <h2 class="page-title" id="pageTitle">仪表盘</h2>
        <div class="topbar-right">
          <span class="version">v0.1.0</span>
        </div>
      </header>

      <!-- 页面内容 -->
      <div class="content" id="content">
        <!-- 各页面由 JS 动态渲染 -->
      </div>
    </main>
  </div>

  <script type="importmap">
  {
    "imports": {
      "codemirror": "https://esm.sh/codemirror@6.0.1",
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.4.1",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.29.1",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.10.3",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.6.0",
      "@codemirror/lang-lua": "https://esm.sh/@codemirror/lang-lua@6.1.0",
      "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2",
      "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.18.1",
      "@codemirror/search": "https://esm.sh/@codemirror/search@6.5.6",
      "@codemirror/lint": "https://esm.sh/@codemirror/lint@6.8.1",
      "@lezer/common": "https://esm.sh/@lezer/common@1.2.1",
      "@lezer/lr": "https://esm.sh/@lezer/lr@1.4.0",
      "@lezer/highlight": "https://esm.sh/@lezer/highlight@1.2.0",
      "@lezer/lua": "https://esm.sh/@lezer/lua@1.0.0",
      "crelt": "https://esm.sh/crelt@1.0.6",
      "style-mod": "https://esm.sh/style-mod@4.1.2",
      "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8"
    }
  }
  </script>
  <script src="js/api.js"></script>
  <script type="module" src="js/editor.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
